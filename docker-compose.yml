services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: codeguard_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codeguard}
      POSTGRES_USER: ${POSTGRES_USER:-codeguard_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codeguard_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codeguard_user} -d ${POSTGRES_DB:-codeguard}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: codeguard_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-codeguard_redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli --no-auth-warning -a \"$REDIS_PASSWORD\" ping 2>/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Docker Socket Proxy (restricts Docker API access)
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.1
    container_name: codeguard_docker_proxy
    restart: always
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 0
      VOLUMES: 0
      POST: 0
      BUILD: 0
      EXEC: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codeguard_api
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-codeguard_user}:${POSTGRES_PASSWORD:-codeguard_password}@postgres:5432/${POSTGRES_DB:-codeguard}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-codeguard_redis_pass}@redis:6379/0
      - REDIS_ENABLED=true
      - JWT_ALGORITHM=RS256
      - JWT_PRIVATE_KEY_PATH=/app/certs/jwt_private.pem
      - JWT_PUBLIC_KEY_PATH=/app/certs/jwt_public.pem
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_URL=http://host.docker.internal:11434
      - DOCKER_HOST=tcp://docker-proxy:2375
      - DEBUG=${DEBUG:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codeguard_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: always

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: codeguard_celery
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codeguard_user}:${POSTGRES_PASSWORD:-codeguard_password}@postgres:5432/${POSTGRES_DB:-codeguard}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-codeguard_redis_pass}@redis:6379/0
      - REDIS_ENABLED=true
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info

  # Celery Beat (Schedule)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: codeguard_celery_beat
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codeguard_user}:${POSTGRES_PASSWORD:-codeguard_password}@postgres:5432/${POSTGRES_DB:-codeguard}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-codeguard_redis_pass}@redis:6379/0
      - REDIS_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
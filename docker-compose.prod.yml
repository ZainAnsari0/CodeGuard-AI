# ═══════════════════════════════════════════════════════════════════
# CodeGuard AI — Production Docker Compose Overlay
# ═══════════════════════════════════════════════════════════════════
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file OVERRIDES docker-compose.yml for production:
#   - Removes dev conveniences (bind mounts, --reload, exposed DB ports)
#   - Adds production hardening (resource limits, logging, healthchecks)
#   - Adds monitoring exporters (PostgreSQL, Redis, Node)
#   - Adds network isolation (public, backend, data, monitoring)
#   - Adds certbot for TLS automation
# ═══════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    ports: []   # No external access in production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    shm_size: 256mb
    environment:
      # Performance tuning for production
      POSTGRES_SHARED_BUFFERS: "256MB"
      POSTGRES_WORK_MEM: "16MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "768MB"
    networks:
      - data

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    ports: []   # No external access in production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-codeguard_redis_pass}
      --save 60 1000
      --save 300 100
    networks:
      - data

  # ── Docker Socket Proxy ────────────────────────────────────────
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.1
    container_name: codeguard_docker_proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 0
      VOLUMES: 1
      EXEC: 0
      ALLOW_RESTARTS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - backend

  # ── FastAPI Backend ─────────────────────────────────────────────
  api:
    volumes:
      - ./certs:/app/certs:ro
      - upload_data:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop --http httptools
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-codeguard_user}:${POSTGRES_PASSWORD:-codeguard_password}@postgres:5432/${POSTGRES_DB:-codeguard}
      - DEBUG=false
      - ENVIRONMENT=production
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-codeguard.example.com,www.codeguard.example.com}
      - DOCKER_HOST=tcp://docker-proxy:2375
      - UPLOAD_DIR=/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    networks:
      - backend
      - data

  # ── Frontend (Nginx) ───────────────────────────────────────────
  frontend:
    build:
      args:
        NGINX_ENV: prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot:ro
    environment:
      - NGINX_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - backend
      - public

  # ── Celery Worker ──────────────────────────────────────────────
  celery:
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codeguard_user}:${POSTGRES_PASSWORD:-codeguard_password}@postgres:5432/${POSTGRES_DB:-codeguard}
      - DEBUG=false
      - ENVIRONMENT=production
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping --timeout 5"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    networks:
      - backend
      - data

  # ── Celery Beat ────────────────────────────────────────────────
  celery-beat:
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codeguard_user}:${POSTGRES_PASSWORD:-codeguard_password}@postgres:5432/${POSTGRES_DB:-codeguard}
      - DEBUG=false
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'celery.*beat' | grep -v grep || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend
      - data

  # ── PostgreSQL Exporter ─────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: codeguard_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-codeguard_user}:${POSTGRES_PASSWORD:-codeguard_password}@postgres:5432/${POSTGRES_DB:-codeguard}?sslmode=disable"
    ports:
      - "127.0.0.1:9187:9187"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - data
      - monitoring

  # ── Redis Exporter ──────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: codeguard_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-codeguard_redis_pass}"
    ports:
      - "127.0.0.1:9121:9121"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - data
      - monitoring

  # ── Node Exporter (System Metrics) ─────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: codeguard_node_exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - monitoring

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: codeguard_prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=2GB'
      - '--web.enable-lifecycle'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - monitoring
      - backend

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: codeguard_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change_me_in_production}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN:-grafana.codeguard.example.com}
      - GF_LOG_MODE=console file
      - GF_LOG_LEVEL=info
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - monitoring
      - public

  # ── Certbot (Let's Encrypt) ─────────────────────────────────────
  certbot:
    image: certbot/certbot:v2.11.0
    container_name: codeguard_certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - public

# ── Network隔离 ─────────────────────────────────────────────────
networks:
  public:
    driver: bridge
    name: codeguard_public
  backend:
    driver: bridge
    name: codeguard_backend
    internal: true    # No external access
  data:
    driver: bridge
    name: codeguard_data
    internal: true    # No external access
  monitoring:
    driver: bridge
    name: codeguard_monitoring
    internal: true    # No external access

volumes:
  prometheus_data:
    name: codeguard_prometheus
  grafana_data:
    name: codeguard_grafana
  certbot_webroot:
    name: codeguard_certbot_webroot
  upload_data:
    name: codeguard_uploads
# ═══════════════════════════════════════════════════════════════════
# CodeGuard AI — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════
# Pipeline stages:
#   1. Lint & Test       — Code quality, unit tests, security scan
#   2. Build             — Docker image build + push to registry
#   3. Deploy Staging    — Auto-deploy to staging on main branch
#   4. Deploy Production  — Manual approval + deploy to production
# ═══════════════════════════════════════════════════════════════════

name: CodeGuard AI CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Backend Lint & Test ─────────────────────────────────
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: codeguard_test
          POSTGRES_USER: codeguard_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio pytest-cov pytest-mock httpx

      - name: Lint with ruff
        run: ruff check app/ main.py

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://codeguard_test:test_password@localhost:5432/codeguard_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci
          JWT_ALGORITHM: HS256
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=40

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Job 2: Frontend Lint, Test & Build ────────────────────────
  frontend-test:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --coverage

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: /api/v1

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 5

  # ── Job 3: Security Audit ──────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit safety pip-audit

      - name: Bandit security scan
        run: bandit -r backend/app/ -ll -ii -f json -o bandit-report.json
        continue-on-error: true

      - name: Pip-audit dependency check
        run: |
          cd backend
          pip-audit -r requirements.txt
        continue-on-error: true

      - name: npm audit
        run: |
          cd frontend
          npm audit --audit-level=moderate || true

      - name: Check for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 4: Build & Push Docker Images ─────────────────────────
  build-images:
    name: Build & Push Images
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: api
            dockerfile: backend/Dockerfile
            context: backend
          - image: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
            build_args: NGINX_ENV=prod
          - image: celery
            dockerfile: backend/Dockerfile.celery
            context: backend
          - image: scanner
            dockerfile: backend/Dockerfile.scanner
            context: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ${{ matrix.build_args }}

  # ── Job 5: Deploy to Staging ──────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [build-images]
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/codeguard
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans
            sleep 15
            curl -sf http://localhost:8000/api/v1/health | python3 -m json.tool

  # ── Job 6: Deploy to Production ────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [build-images, security-audit]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment record
        run: |
          echo "Deploying commit ${{ github.sha }} to production"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/codeguard
            # Backup database before deployment
            ./deploy/db-backup.sh
            # Pull latest images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            # Rolling deployment
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps api
            sleep 10
            # Health check
            for i in 1 2 3 4 5 6; do
              if curl -sf http://localhost:8000/api/v1/health | grep -q "healthy"; then
                echo "API is healthy, proceeding with remaining services"
                break
              fi
              echo "Waiting for API health check... ($i/6)"
              sleep 10
            done
            # Deploy remaining services
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            sleep 15
            # Final health check
            curl -sf http://localhost:8000/api/v1/health || exit 1

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/codeguard
            STATUS=$(curl -sf http://localhost:8000/api/v1/ready | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status","unknown"))')
            if [ "$STATUS" != "healthy" ] && [ "$STATUS" != "degraded" ]; then
              echo "❌ Deployment verification failed: status=$STATUS"
              # Auto-rollback
              docker compose -f docker-compose.yml -f docker-compose.prod.yml down api celery celery-beat frontend
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
              exit 1
            fi
            echo "✅ Deployment verified: status=$STATUS"
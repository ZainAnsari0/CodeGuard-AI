# ═══════════════════════════════════════════════════════════════════
# CodeGuard AI — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════
# Pipeline stages:
#   1. Lint & Test       — Code quality, unit tests, security scan
#   2. Build             — Frontend production build
#   3. Deploy Staging    — Auto-deploy to staging on main branch
#   4. Deploy Production — Manual approval + deploy to production
# ═══════════════════════════════════════════════════════════════════

name: CodeGuard AI CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Backend Lint & Test ─────────────────────────────────
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: codeguard_test
          POSTGRES_USER: codeguard_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio pytest-cov pytest-mock httpx

      - name: Lint with ruff
        run: ruff check app/ main.py

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://codeguard_test:test_password@localhost:5432/codeguard_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci
          JWT_ALGORITHM: HS256
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=40

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Job 2: Frontend Lint, Test & Build ────────────────────────
  frontend-test:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --coverage

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: /api/v1

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 5

  # ── Job 3: Security Audit ──────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit safety pip-audit

      - name: Bandit security scan
        run: bandit -r backend/app/ -ll -ii -f json -o bandit-report.json
        continue-on-error: true

      - name: Pip-audit dependency check
        run: |
          cd backend
          pip-audit -r requirements.txt
        continue-on-error: true

      - name: npm audit
        run: |
          cd frontend
          npm audit --audit-level=moderate || true

      - name: Check for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 4: Build Frontend Artifact ─────────────────────────────
  build-frontend:
    name: Build Frontend
    needs: [frontend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_API_URL: /api/v1

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-production
          path: frontend/dist/
          retention-days: 5

  # ── Job 5: Deploy to Staging ──────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [backend-test, build-frontend]
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/codeguard
            git pull origin staging
            cd backend && source venv/bin/activate && pip install -r requirements.txt -q
            cd .. && cd frontend && npm ci && npm run build
            cd .. && bash deploy/deploy.sh --skip-backup
            sleep 15
            curl -sf http://localhost:8000/api/v1/health | python3 -m json.tool

  # ── Job 6: Deploy to Production ────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [build-frontend, security-audit]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment record
        run: |
          echo "Deploying commit ${{ github.sha }} to production"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/codeguard
            # Backup database before deployment
            bash deploy/db-backup.sh
            # Pull latest code and deploy
            git pull origin main
            bash deploy/deploy.sh

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            STATUS=$(curl -sf http://localhost:8000/api/v1/ready | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status","unknown"))')
            if [ "$STATUS" != "healthy" ] && [ "$STATUS" != "degraded" ]; then
              echo "❌ Deployment verification failed: status=$STATUS"
              # Auto-rollback
              bash deploy/deploy.sh --rollback
              exit 1
            fi
            echo "✅ Deployment verified: status=$STATUS"
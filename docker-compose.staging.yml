# CodeGuard AI — Staging Docker Compose Overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# Staging mirrors production but with:
#   - Bind mounts for hot-reload debugging
#   - Exposed debug ports
#   - Lower resource limits
#   - Debug logging

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    ports:
      - "127.0.0.1:5432:5432"  # Expose for debugging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codeguard_staging}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    ports:
      - "127.0.0.1:6379:6379"  # Expose for debugging
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── FastAPI Backend ─────────────────────────────────────────────
  api:
    volumes:
      - ./backend:/app:ro           # Read-only bind mount for debugging
      - ./certs:/app/certs:ro
    environment:
      - ENVIRONMENT=staging
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-codeguard_user}:${POSTGRES_PASSWORD:-codeguard_password}@postgres:5432/${POSTGRES_DB:-codeguard_staging}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-codeguard_redis_pass}@redis:6379/0
      - REDIS_ENABLED=true
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "127.0.0.1:8000:8000"     # Expose for API docs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 768M

  # ── Frontend (Nginx) ───────────────────────────────────────────
  frontend:
    build:
      args:
        NGINX_ENV: dev                # Dev nginx config for staging
    ports:
      - "3000:80"
    environment:
      - NGINX_ENV=staging
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Celery Worker ──────────────────────────────────────────────
  celery:
    environment:
      - ENVIRONMENT=staging
      - DEBUG=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codeguard_user}:${POSTGRES_PASSWORD:-codeguard_password}@postgres:5432/${POSTGRES_DB:-codeguard_staging}
    command: celery -A app.tasks.celery_app worker --loglevel=debug --concurrency=2
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Celery Beat ────────────────────────────────────────────────
  celery-beat:
    environment:
      - ENVIRONMENT=staging
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codeguard_user}:${POSTGRES_PASSWORD:-codeguard_password}@postgres:5432/${POSTGRES_DB:-codeguard_staging}
    command: celery -A app.tasks.celery_app beat --loglevel=debug
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256M
# CodeGuard AI — Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'codeguard'

rule_files:
  - 'alerts.yml'

scrape_configs:
  # ── FastAPI Application ────────────────────────────────────
  - job_name: 'codeguard-api'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:8000']
        labels:
          service: 'api'

  # ── PostgreSQL Exporter ─────────────────────────────────────
  - job_name: 'postgres-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9187']
        labels:
          service: 'postgres'

  # ── Redis Exporter ──────────────────────────────────────────
  - job_name: 'redis-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9121']
        labels:
          service: 'redis'

  # ── Prometheus self-monitoring ─────────────────────────────
  - job_name: 'prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
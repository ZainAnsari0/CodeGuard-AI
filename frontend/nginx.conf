# CodeGuard AI — Development Nginx Configuration
# Simple HTTP-only config for local development with Docker Compose.

upstream api_backend {
    server api:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend routes — SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy with headers
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        client_max_body_size 10m;
    }

    # Health check endpoints
    location /health {
        default_type application/json;
        return 200 '{"status":"healthy"}';
    }

    location = /api/v1/health {
        proxy_pass http://api_backend;
        proxy_set_header Host $http_host;
    }

    location = /api/v1/ready {
        proxy_pass http://api_backend;
        proxy_set_header Host $http_host;
    }

    # API docs (available in dev)
    location /api/v1/docs {
        proxy_pass http://api_backend;
        proxy_set_header Host $http_host;
    }

    location /api/v1/redoc {
        proxy_pass http://api_backend;
        proxy_set_header Host $http_host;
    }

    location /openapi.json {
        proxy_pass http://api_backend;
        proxy_set_header Host $http_host;
    }

    # Static assets caching (Vite hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Dev metrics
    location /metrics {
        proxy_pass http://api_backend;
        proxy_set_header Host $http_host;
    }
}
# ══════════════════════════════════════════════════════════════════
# CodeGuard AI — Production Nginx Configuration
# ══════════════════════════════════════════════════════════════════
# Features: HTTPS, Brotli/gzip compression, security headers, rate limiting,
#           SPA routing, static asset caching, API proxy, monitoring, health checks
# ══════════════════════════════════════════════════════════════════

# ── Upstream ──────────────────────────────────────────────────────
upstream api_backend {
    server api:8000;
    keepalive 32;
}

# ── Rate limiting zones ───────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

# ── Connection limit ─────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── CORS origin allowlist ─────────────────────────────────────────
map $http_origin $cors_origin {
    default "";
    "~^https?://localhost(:[0-9]+)?$" $http_origin;
    "~^https://codeguard\.example\.com$" $http_origin;
    "~^https://www\.codeguard\.example\.com$" $http_origin;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS Configuration (Mozilla Modern profile) ──────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/tls_private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (enable when using real certs)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;

    # ── Security Headers ──────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'nonce-$request_id'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header X-Request-ID              $request_id always;

    # ── Gzip Compression ───────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2
        font/woff;

    # ── Frontend ───────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ──────────────────────────────────────
    # Vite outputs hashed filenames like assets/index-AbC123.js
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        # omit CSP for static assets to avoid duplicate header conflict
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # ── Health Check Endpoint (nginx-level) ──────────────────────
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy"}';
    }

    # ── API Proxy ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, X-Requested-With, X-Request-ID' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        # Buffering for API responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Large file uploads (up to 10MB)
        client_max_body_size 10m;
    }

    # ── Auth Endpoints (stricter rate limiting) ───────────────────
    location /api/v1/auth/login {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location /api/v1/auth/register {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # ── File Upload Endpoints (lower rate limit, larger body) ─────
    location /api/v1/projects/*/files {
        limit_req zone=upload_limit burst=3 nodelay;
        client_max_body_size 10m;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # ── API Health Check (no rate limit) ──────────────────────────
    location = /api/v1/health {
        access_log off;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }

    location = /api/v1/ready {
        access_log off;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }

    # ── API Docs (production: disabled by app, but proxy if enabled) ──
    location /api/v1/docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /api/v1/redoc {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Monitoring (restrict access to internal networks) ────────
    location = /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }

    # ── Deny access to hidden files ────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Log format with request ID ────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time request_id=$request_id';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
}